version: 1

frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
        - npm ci

    build:
      commands:
        - echo "Injecting environment variables..."
        - echo "NODE_ENV=production" >> .env.production
        - echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env.production
        - echo "AWS_REGION=$AWS_REGION" >> .env.production
        - echo "PROMPT_BUCKET=$PROMPT_BUCKET" >> .env.production
        - echo "USE_S3_PROMPTS=true" >> .env.production
        - echo "=== Content of .env.production ===" && cat .env.production
        - npm run build


  artifacts:
    baseDirectory: .next
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

backend:
  phases:
    build:
      commands:
        - echo "Backend build phase"
